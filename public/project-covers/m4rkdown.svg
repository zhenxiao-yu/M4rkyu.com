<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">M4rkdown monochrome cover</title>
  <desc id="desc">A split markdown editor: raw syntax on the left with a live caret, rendered preview on the right.</desc>
  <rect width="1200" height="750" fill="#050505"/>

  <!-- editor / preview split frame -->
  <g fill="none" stroke="#f2f0ea" stroke-width="2" opacity=".35">
    <rect x="90" y="95" width="1020" height="560"/>
    <line x1="600" y1="95" x2="600" y2="655"/>
  </g>

  <!-- left: raw markdown source -->
  <g font-family="'Courier New', ui-monospace, monospace" font-size="34" fill="#f2f0ea">
    <text x="135" y="185" opacity=".9"># m4rkdown</text>
    <text x="135" y="250" opacity=".75">**offline-first**</text>
    <text x="135" y="315" opacity=".75">&gt; collaborate live</text>
    <text x="135" y="380" opacity=".75">- type together</text>
    <text x="135" y="445" opacity=".9">type her<tspan>e</tspan></text>
  </g>
  <!-- the live caret -->
  <rect x="318" y="418" width="6" height="34" fill="#67e8f9"/>

  <!-- right: rendered preview blocks -->
  <g fill="#f2f0ea">
    <rect x="640" y="160" width="300" height="34" rx="4" opacity=".9"/>
    <rect x="640" y="232" width="430" height="16" rx="4" opacity=".4"/>
    <rect x="640" y="266" width="390" height="16" rx="4" opacity=".4"/>
    <rect x="640" y="300" width="410" height="16" rx="4" opacity=".4"/>
    <rect x="654" y="356" width="16" height="16" rx="4" opacity=".7"/>
    <rect x="690" y="356" width="320" height="16" rx="4" opacity=".4"/>
    <rect x="654" y="392" width="16" height="16" rx="4" opacity=".7"/>
    <rect x="690" y="392" width="280" height="16" rx="4" opacity=".4"/>
  </g>

  <!-- typing-arena keycaps, one live -->
  <g>
    <rect x="640" y="540" width="64" height="64" rx="10" fill="none" stroke="#f2f0ea" stroke-width="2" opacity=".55"/>
    <rect x="716" y="540" width="64" height="64" rx="10" fill="#67e8f9"/>
    <rect x="792" y="540" width="64" height="64" rx="10" fill="none" stroke="#f2f0ea" stroke-width="2" opacity=".55"/>
    <rect x="868" y="540" width="140" height="64" rx="10" fill="none" stroke="#f2f0ea" stroke-width="2" opacity=".55"/>
  </g>
</svg>
