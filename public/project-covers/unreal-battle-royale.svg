<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Unreal Battle Royale Prototype monochrome cover</title>
  <desc id="desc">A tactical map with a shrinking circular safe zone, player markers, and a flight path.</desc>
  <rect width="1200" height="750" fill="#050505"/>

  <!-- map grid -->
  <defs>
    <pattern id="map-grid" width="75" height="75" patternUnits="userSpaceOnUse">
      <path d="M75 0H0V75" fill="none" stroke="#f2f0ea" stroke-width="1.25"/>
    </pattern>
  </defs>
  <rect width="1200" height="750" fill="url(#map-grid)" opacity=".16"/>

  <!-- terrain blocks -->
  <g fill="#f2f0ea" opacity=".22">
    <rect x="150" y="470" width="160" height="120" rx="10"/>
    <rect x="930" y="170" width="140" height="150" rx="10"/>
    <path d="M520 120 L640 150 L600 250 L470 230 Z"/>
  </g>

  <!-- flight path across the map -->
  <line x1="120" y1="150" x2="1080" y2="560" stroke="#f2f0ea" stroke-width="2.5" stroke-dasharray="3 16" stroke-linecap="round" opacity=".55"/>

  <!-- current safe zone (white dashed) -->
  <circle cx="600" cy="375" r="270" fill="none" stroke="#f2f0ea" stroke-width="3" stroke-dasharray="14 12" opacity=".7"/>
  <!-- next safe zone (cyan) -->
  <circle cx="690" cy="430" r="150" fill="#67e8f9" opacity=".08"/>
  <circle cx="690" cy="430" r="150" fill="none" stroke="#67e8f9" stroke-width="4"/>

  <!-- player markers -->
  <g fill="#f2f0ea">
    <circle cx="500" cy="300" r="13"/>
    <circle cx="780" cy="360" r="13"/>
    <circle cx="640" cy="520" r="13"/>
  </g>
  <!-- you -->
  <circle cx="690" cy="430" r="17" fill="#67e8f9" stroke="#050505" stroke-width="3"/>
</svg>
