name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate-legacy:
    name: Validate legacy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run build

  validate-next:
    name: Validate next-portfolio
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next-portfolio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: next-portfolio/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run build-storybook

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-legacy, validate-next]
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: M4rkyu.com ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## M4rkyu.com ${{ github.ref_name }}

            Portfolio monorepo containing the live legacy site and the actively developed Next.js remake.

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for curated release notes.
