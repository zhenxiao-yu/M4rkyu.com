name: Supabase migrations

# Applies new SQL migrations to the linked Supabase project whenever
# a push to main changes supabase/migrations/**. Manual re-run is
# always available from the Actions tab.
#
# One-time setup (per repo):
#   - Secret  SUPABASE_ACCESS_TOKEN   — Personal access token from
#     https://supabase.com/dashboard/account/tokens
#   - Secret  SUPABASE_DB_PASSWORD    — Project DB password (Supabase
#     dashboard → Project Settings → Database → Connection string)
#   - Variable SUPABASE_PROJECT_REF   — The project ref slug from
#     the Supabase dashboard URL: https://supabase.com/dashboard/project/<REF>
#
# `supabase db push` is idempotent: each migration row is tracked in
# the supabase_migrations.schema_migrations table, so re-running on
# unchanged input is a no-op. If a migration was applied via the
# dashboard SQL editor first, push will detect the drift and exit
# non-zero — fix by either deleting that migration file or running
# `supabase migration repair --status applied <version>` manually.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  push:
    name: supabase db push
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard on required secrets
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::Repo secret SUPABASE_ACCESS_TOKEN is not set. See supabase/README.md."
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "::error::Repo secret SUPABASE_DB_PASSWORD is not set. See supabase/README.md."
            exit 1
          fi
          if [ -z "${{ vars.SUPABASE_PROJECT_REF }}" ]; then
            echo "::error::Repo variable SUPABASE_PROJECT_REF is not set. See supabase/README.md."
            exit 1
          fi

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: |
          supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}"

      - name: Push migrations
        run: |
          supabase db push --include-all --yes
